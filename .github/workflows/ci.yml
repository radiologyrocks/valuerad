name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: server
      - run: npm test
        working-directory: server
      - run: npm run eval
        working-directory: server

  # The live Postgres backends + schema (test/integration/). DATABASE_URL is
  # scoped to the integration step only: the unit files' `delete
  # process.env.DATABASE_URL` runs AFTER their ESM imports resolve, so a
  # job-wide var would silently point unit tests at the real database.
  server-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: server
      - run: node --test test/integration/pg.integration.test.js
        working-directory: server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          PGSSL: disable
